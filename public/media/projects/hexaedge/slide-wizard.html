<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;background:#F2F6F7;font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;color:#14233A}
.canvas{width:1920px;height:1080px;padding:72px 100px;display:flex;flex-direction:column;gap:40px}
.header{display:flex;justify-content:space-between;align-items:flex-end}
.eyebrow{font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;font-size:16px;letter-spacing:0.28em;color:#9C7A3A;text-transform:uppercase}
.title{font-family:'Cormorant Garamond','Noto Serif SC','Times New Roman',serif;font-size:64px;font-weight:600;letter-spacing:0.03em;margin-top:8px}
.subtitle{font-family:'Cormorant Garamond','Noto Serif SC','Times New Roman',serif;font-size:26px;font-style:italic;color:#7C95AE}
.screenshot-area{flex:1;border:2px dashed #D6DFE2;border-radius:6px;display:flex;align-items:center;justify-content:center;background:#fff}
.screenshot-hint{font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;font-size:18px;letter-spacing:0.15em;color:#B6C3C7;text-transform:uppercase}
.footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid #D6DFE2}
.footer-left{font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:#7C95AE;letter-spacing:0.1em}
</style></head>
<body>
<div class="canvas">
  <div class="header">
    <div>
      <div class="eyebrow">USER FLOW · 3-STEP WIZARD</div>
      <div class="title">Three Steps to Instant Signals</div>
    </div>
    <div class="subtitle">Plain-Language Guidance at Every Step</div>
  </div>
  <div class="screenshot-area">
    <div class="screenshot-hint">Screenshot · 3-Step Wizard Flow</div>
  </div>
  <div class="footer">
    <div class="footer-left">HEXAEDGE — USER FLOW</div>
  </div>
</div>
</body></html>
